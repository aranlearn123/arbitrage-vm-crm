basePath: /api/v1
definitions:
  response.Allocation:
    properties:
      base:
        type: string
      budget_usd:
        type: string
      created_at:
        type: string
      direction:
        type: string
      id:
        type: integer
      note:
        type: string
      pair:
        type: string
      quote:
        type: string
      rank:
        type: integer
      role:
        type: string
      score:
        type: string
      status:
        type: string
      updated_at:
        type: string
      worker_pid:
        type: string
    type: object
  response.AllocationDetail:
    properties:
      data:
        $ref: '#/definitions/response.Allocation'
    type: object
  response.AllocationList:
    properties:
      count:
        type: integer
      data:
        items:
          $ref: '#/definitions/response.Allocation'
        type: array
      limit:
        type: integer
    type: object
  response.AllocationSummary:
    properties:
      active:
        type: integer
      active_budget_usd:
        type: string
      by_status:
        additionalProperties:
          format: int64
          type: integer
        type: object
      cancelled:
        type: integer
      cancelled_by_reason:
        items:
          $ref: '#/definitions/response.CancelledReasonCount'
        type: array
      total:
        type: integer
    type: object
  response.AllocationTimeline:
    properties:
      allocation_id:
        type: integer
      count:
        type: integer
      data:
        items:
          $ref: '#/definitions/response.AllocationTimelineEvent'
        type: array
    type: object
  response.AllocationTimelineEvent:
    properties:
      event:
        type: string
      payload:
        type: string
      reason:
        type: string
      reference_id:
        type: string
      source:
        type: string
      stage:
        type: string
      status:
        type: string
      time:
        type: string
    type: object
  response.CancelledReasonCount:
    properties:
      count:
        type: integer
      reason:
        type: string
    type: object
  response.CancelledReasonList:
    properties:
      count:
        type: integer
      data:
        items:
          $ref: '#/definitions/response.CancelledReasonCount'
        type: array
      limit:
        type: integer
    type: object
  response.CombinedEquity:
    properties:
      account_equity:
        type: string
      available_balance:
        type: string
      initial_margin:
        type: string
      maintenance_margin:
        type: string
      time:
        type: string
      unrealized_pnl:
        type: string
      wallet_balance:
        type: string
    type: object
  response.EquityCoin:
    properties:
      available_balance:
        type: string
      coin:
        type: string
      equity:
        type: string
      locked:
        type: string
      unrealized_pnl:
        type: string
      usd_value:
        type: string
      wallet_balance:
        type: string
    type: object
  response.EquityFetchError:
    properties:
      error:
        type: string
      exchange:
        type: string
    type: object
  response.EquityLatest:
    properties:
      cache_ttl_seconds:
        type: integer
      combined:
        $ref: '#/definitions/response.CombinedEquity'
      count:
        type: integer
      data:
        items:
          $ref: '#/definitions/response.EquitySnapshot'
        type: array
      errors:
        items:
          $ref: '#/definitions/response.EquityFetchError'
        type: array
    type: object
  response.EquitySnapshot:
    properties:
      account_equity:
        type: string
      available_balance:
        type: string
      cached:
        type: boolean
      coins:
        items:
          $ref: '#/definitions/response.EquityCoin'
        type: array
      exchange:
        type: string
      initial_margin:
        type: string
      maintenance_margin:
        type: string
      source:
        type: string
      time:
        type: string
      unrealized_pnl:
        type: string
      wallet_balance:
        type: string
    type: object
  response.Error:
    properties:
      error:
        type: string
    type: object
  response.FundingRate:
    properties:
      base:
        type: string
      exchange:
        type: string
      funding_rate:
        type: string
      pair:
        type: string
      quote:
        type: string
      time:
        type: string
    type: object
  response.FundingRateList:
    properties:
      count:
        type: integer
      data:
        items:
          $ref: '#/definitions/response.FundingRate'
        type: array
      limit:
        type: integer
    type: object
  response.FundingSpread:
    properties:
      abs_spread_bps:
        type: string
      base:
        type: string
      bitget_rate:
        type: string
      bitget_time:
        type: string
      bybit_rate:
        type: string
      bybit_time:
        type: string
      direction_hint:
        type: string
      pair:
        type: string
      quote:
        type: string
      spread:
        type: string
      spread_bps:
        type: string
      time:
        type: string
    type: object
  response.FundingSpreadDetail:
    properties:
      data:
        $ref: '#/definitions/response.FundingSpread'
    type: object
  response.FundingSpreadList:
    properties:
      count:
        type: integer
      data:
        items:
          $ref: '#/definitions/response.FundingSpread'
        type: array
      limit:
        type: integer
    type: object
  response.Health:
    properties:
      checks:
        $ref: '#/definitions/response.HealthChecks'
      status:
        type: string
      time:
        type: string
    type: object
  response.HealthChecks:
    properties:
      api:
        $ref: '#/definitions/response.HealthComponent'
      database:
        $ref: '#/definitions/response.HealthComponent'
    type: object
  response.HealthComponent:
    properties:
      error:
        type: string
      status:
        type: string
    type: object
  response.MarketQualityAlert:
    properties:
      base:
        type: string
      depth_stability_ratio:
        type: string
      exchange:
        type: string
      mid_speed_bps_per_sec_p95:
        type: string
      pair:
        type: string
      quote:
        type: string
      reasons:
        items:
          type: string
        type: array
      samples:
        type: integer
      spread_bps_p50:
        type: string
      time:
        type: string
    type: object
  response.MarketQualityAlertList:
    properties:
      count:
        type: integer
      data:
        items:
          $ref: '#/definitions/response.MarketQualityAlert'
        type: array
      limit:
        type: integer
    type: object
  response.MarketQualityList:
    properties:
      count:
        type: integer
      data:
        items:
          $ref: '#/definitions/response.MarketQualityMetric'
        type: array
      limit:
        type: integer
    type: object
  response.MarketQualityMetric:
    properties:
      base:
        type: string
      depth_stability_ratio:
        type: string
      exchange:
        type: string
      mid_speed_bps_per_sec_p95:
        type: string
      pair:
        type: string
      quote:
        type: string
      samples:
        type: integer
      spread_bps_p50:
        type: string
      time:
        type: string
    type: object
  response.PnLEvent:
    properties:
      amount:
        type: string
      base:
        type: string
      component:
        type: string
      created_at:
        type: string
      currency:
        type: string
      event_time:
        type: string
      exchange:
        type: string
      pair:
        type: string
      quote:
        type: string
      source_id:
        type: string
      source_type:
        type: string
    type: object
  response.PnLEventList:
    properties:
      count:
        type: integer
      data:
        items:
          $ref: '#/definitions/response.PnLEvent'
        type: array
      limit:
        type: integer
    type: object
  response.PnLGroup:
    properties:
      base:
        type: string
      component:
        type: string
      count:
        type: integer
      exchange:
        type: string
      first_event_time:
        type: string
      funding_amount:
        type: string
      last_event_time:
        type: string
      pair:
        type: string
      quote:
        type: string
      total_amount:
        type: string
      trading_fee_amount:
        type: string
      trading_pnl_amount:
        type: string
    type: object
  response.PnLGroupList:
    properties:
      count:
        type: integer
      data:
        items:
          $ref: '#/definitions/response.PnLGroup'
        type: array
      limit:
        type: integer
    type: object
  response.PnLSummary:
    properties:
      by_component:
        items:
          $ref: '#/definitions/response.PnLGroup'
        type: array
      by_exchange:
        items:
          $ref: '#/definitions/response.PnLGroup'
        type: array
      by_pair:
        items:
          $ref: '#/definitions/response.PnLGroup'
        type: array
      count:
        type: integer
      funding_amount:
        type: string
      total_amount:
        type: string
      trading_fee_amount:
        type: string
      trading_pnl_amount:
        type: string
    type: object
  response.SystemAllocationStatus:
    properties:
      last_updated_at:
        type: string
      running:
        type: integer
      total:
        type: integer
    type: object
  response.SystemExchange:
    properties:
      credential_configured:
        type: boolean
      demo:
        type: boolean
      enabled:
        type: boolean
      exchange:
        type: string
      last_account_event_at:
        type: string
      last_funding_at:
        type: string
      last_market_data_at:
        type: string
      last_market_quality_at:
        type: string
      last_open_interest_at:
        type: string
      last_wallet_snapshot_at:
        type: string
      notes:
        items:
          type: string
        type: array
      status:
        type: string
      supported:
        type: boolean
    type: object
  response.SystemExchangeList:
    properties:
      count:
        type: integer
      data:
        items:
          $ref: '#/definitions/response.SystemExchange'
        type: array
    type: object
  response.SystemMarketDataStatus:
    properties:
      funding_last_at:
        type: string
      market_quality_last_at:
        type: string
      open_interest_last_at:
        type: string
    type: object
  response.SystemStatus:
    properties:
      allocations:
        $ref: '#/definitions/response.SystemAllocationStatus'
      api_version:
        type: string
      database:
        $ref: '#/definitions/response.HealthComponent'
      exchanges:
        items:
          $ref: '#/definitions/response.SystemExchange'
        type: array
      market_data:
        $ref: '#/definitions/response.SystemMarketDataStatus'
      status:
        type: string
      time:
        type: string
      timescale:
        $ref: '#/definitions/response.HealthComponent'
    type: object
info:
  contact: {}
  description: CRM monitoring API for arbitrage trading system.
  title: Arbitrage VM CRM API
  version: 0.1.0
paths:
  /allocations:
    get:
      description: List allocations with optional status, base, quote, and role filters
      parameters:
      - description: Filter by status. Supports comma-separated values.
        in: query
        name: status
        type: string
      - description: Filter by base asset. Supports comma-separated values.
        in: query
        name: base
        type: string
      - description: Filter by quote asset. Supports comma-separated values.
        in: query
        name: quote
        type: string
      - description: Filter by crowding role. Supports comma-separated values.
        in: query
        name: role
        type: string
      - default: 100
        description: Maximum rows to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AllocationList'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: List allocations
      tags:
      - Allocations
  /allocations/{id}:
    get:
      description: Get one allocation by id
      parameters:
      - description: Allocation ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AllocationDetail'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Allocation detail
      tags:
      - Allocations
  /allocations/{id}/timeline:
    get:
      description: Build allocation timeline from allocation, scaling, recovery, routing,
        and order progress tables
      parameters:
      - description: Allocation ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AllocationTimeline'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Allocation timeline
      tags:
      - Allocations
  /allocations/active:
    get:
      description: List allocations in created, running, failed, or paused state
      parameters:
      - default: 100
        description: Maximum rows to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AllocationList'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Active allocations
      tags:
      - Allocations
  /allocations/cancelled:
    get:
      description: List cancelled allocations with optional base, quote, role, and
        reason filters
      parameters:
      - description: Filter by base asset. Supports comma-separated values.
        in: query
        name: base
        type: string
      - description: Filter by quote asset. Supports comma-separated values.
        in: query
        name: quote
        type: string
      - description: Filter by crowding role. Supports comma-separated values.
        in: query
        name: role
        type: string
      - description: Filter by normalized cancel reason. Supports comma-separated
          values.
        in: query
        name: reason
        type: string
      - default: 100
        description: Maximum rows to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AllocationList'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Cancelled allocations
      tags:
      - Allocations
  /allocations/cancelled/reasons:
    get:
      description: Count cancelled allocations grouped by note/reason
      parameters:
      - default: 100
        description: Maximum rows to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.CancelledReasonList'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Cancelled allocation reasons
      tags:
      - Allocations
  /allocations/running:
    get:
      description: List allocations currently in running state
      parameters:
      - default: 100
        description: Maximum rows to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AllocationList'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Running allocations
      tags:
      - Allocations
  /allocations/summary:
    get:
      description: Count allocations by status and show active budget
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.AllocationSummary'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Allocation summary
      tags:
      - Allocations
  /equity/latest:
    get:
      description: Temporarily fetch latest wallet/equity directly from exchange APIs
        with a short backend cache
      parameters:
      - description: 'Filter by exchange: bybit, bitget. Supports comma-separated
          values.'
        in: query
        name: exchange
        type: string
      - default: USDT
        description: Margin quote coins. Supports comma-separated values.
        in: query
        name: quote
        type: string
      - description: Bypass backend cache and pull from exchange API
        in: query
        name: refresh
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.EquityLatest'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/response.EquityLatest'
      summary: Latest equity from exchange API
      tags:
      - Equity
  /equity/live:
    get:
      description: Temporarily fetch latest wallet/equity directly from exchange APIs
        with a short backend cache
      parameters:
      - description: 'Filter by exchange: bybit, bitget. Supports comma-separated
          values.'
        in: query
        name: exchange
        type: string
      - default: USDT
        description: Margin quote coins. Supports comma-separated values.
        in: query
        name: quote
        type: string
      - description: Bypass backend cache and pull from exchange API
        in: query
        name: refresh
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.EquityLatest'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/response.EquityLatest'
      summary: Latest equity from exchange API
      tags:
      - Equity
  /funding/history:
    get:
      description: List historical funding rates
      parameters:
      - description: Filter by exchange. Supports comma-separated values.
        in: query
        name: exchange
        type: string
      - description: Filter by base asset. Supports comma-separated values.
        in: query
        name: base
        type: string
      - description: Filter by quote asset. Supports comma-separated values.
        in: query
        name: quote
        type: string
      - description: Inclusive start time. Supports RFC3339 or YYYY-MM-DD.
        in: query
        name: from
        type: string
      - description: Exclusive end time. Supports RFC3339 or YYYY-MM-DD.
        in: query
        name: to
        type: string
      - default: 100
        description: Maximum rows to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.FundingRateList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Funding history
      tags:
      - Funding
  /funding/latest:
    get:
      description: List latest funding rate per exchange and pair
      parameters:
      - description: Filter by exchange. Supports comma-separated values.
        in: query
        name: exchange
        type: string
      - description: Filter by base asset. Supports comma-separated values.
        in: query
        name: base
        type: string
      - description: Filter by quote asset. Supports comma-separated values.
        in: query
        name: quote
        type: string
      - default: 100
        description: Maximum rows to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.FundingRateList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Latest funding rates
      tags:
      - Funding
  /funding/spread:
    get:
      description: Get latest Bybit versus Bitget funding spread for one pair
      parameters:
      - description: Base asset
        in: query
        name: base
        required: true
        type: string
      - default: USDT
        description: Quote asset
        in: query
        name: quote
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.FundingSpreadDetail'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Funding spread
      tags:
      - Funding
  /funding/top-spreads:
    get:
      description: List pairs with the largest absolute Bybit versus Bitget funding
        spread
      parameters:
      - description: Filter by base asset. Supports comma-separated values.
        in: query
        name: base
        type: string
      - description: Filter by quote asset. Supports comma-separated values.
        in: query
        name: quote
        type: string
      - default: 0
        description: Minimum absolute spread in bps
        in: query
        name: min_abs_spread_bps
        type: number
      - default: 100
        description: Maximum rows to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.FundingSpreadList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Top funding spreads
      tags:
      - Funding
  /health:
    get:
      description: Check API service and database status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Health'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/response.Health'
      summary: Health check
      tags:
      - System
  /market-quality/alerts:
    get:
      description: List latest market quality rows that violate simple CRM thresholds
      parameters:
      - description: Filter by exchange. Supports comma-separated values.
        in: query
        name: exchange
        type: string
      - description: Filter by base asset. Supports comma-separated values.
        in: query
        name: base
        type: string
      - description: Filter by quote asset. Supports comma-separated values.
        in: query
        name: quote
        type: string
      - default: 10
        description: Alert when samples are below this value
        in: query
        name: min_samples
        type: integer
      - default: 10
        description: Alert when spread_bps_p50 is above this value
        in: query
        name: max_spread_bps_p50
        type: number
      - default: 50
        description: Alert when mid speed p95 is above this value
        in: query
        name: max_mid_speed_bps_per_sec_p95
        type: number
      - default: 0.1
        description: Alert when depth stability ratio is below this value
        in: query
        name: min_depth_stability_ratio
        type: number
      - default: 100
        description: Maximum rows to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.MarketQualityAlertList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Error'
      summary: Market quality alerts
      tags:
      - Market Quality
  /market-quality/history:
    get:
